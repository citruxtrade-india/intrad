<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gravity Analytics</title>
    <link rel="stylesheet" href="dashboard_v2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Anti-Gravity <span>Intelligence</span></h1>
            <div class="status-indicator">
                <span class="pulse active"></span>
                <span>SYSTEM HEALTH: 100%</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card glass-panel metrics">
                <h2>Total Capital Risked</h2>
                <p class="big-number">₹42,500.00</p>
                <div class="trend up">▲ +2.4% Today</div>
            </section>
            
            <section class="card glass-panel signals">
                <h2>Live Intelligence Feed</h2>
                <ul class="signal-list">
                    <li>
                        <span class="badge buy">BUY</span> 
                        <strong>NIFTY 50</strong> 
                        <span class="price">21,450.00</span>
                    </li>
                    <li>
                        <span class="badge sell">SELL</span> 
                        <strong>CRUDEOIL</strong> 
                        <span class="price">6,120.00</span>
                    </li>
                    <li>
                        <span class="badge hold">HOLD</span> 
                        <strong>HDFCBANK</strong> 
                        <span class="price">1,600.00</span>
                    </li>
                </ul>
            </section>
            
            <section class="card glass-panel chart-placeholder">
                <h2>Volatility Index</h2>
                <div class="wave-animation">
                    <!-- CSS animated waves for rich aesthetics -->
                    <div class="wave wave1"></div>
                    <div class="wave wave2"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard_v2.js"></script>
</body>
</html>
